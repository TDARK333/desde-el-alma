<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lluvia de Amor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050510; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Georgia', serif; }
  canvas { display: block; position: absolute; top: 0; left: 0; }

  #toggle-btn {
    position: absolute; top: 14px; right: 18px; z-index: 100;
    display: flex; align-items: center; gap: 9px; cursor: pointer;
    background: rgba(30,0,40,0.72); border: 1.5px solid #ff6ef7;
    border-radius: 30px; padding: 7px 18px 7px 12px;
    box-shadow: 0 0 12px #ff6ef755, 0 0 28px #aa22aa44;
    transition: box-shadow 0.3s; user-select: none;
  }
  #toggle-btn:hover { box-shadow: 0 0 18px #ff6ef7aa, 0 0 40px #aa22aa77; }
  #toggle-btn span {
    font-size: 13px; font-style: italic; font-weight: bold;
    color: #ffccff; text-shadow: 0 0 8px #ff88ff, 0 0 18px #ff44ff; letter-spacing: 0.5px;
  }
  .toggle-circle {
    width: 36px; height: 20px; background: #2a0035;
    border-radius: 10px; border: 1.5px solid #ff6ef7;
    position: relative; transition: background 0.3s; flex-shrink: 0;
  }
  .toggle-circle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #ff6ef7; box-shadow: 0 0 6px #ff6ef7;
    transition: left 0.3s, background 0.3s;
  }
  .toggle-circle.on { background: #550060; }
  .toggle-circle.on::after { left: 18px; background: #ffccff; box-shadow: 0 0 10px #ffccff; }

  #music-btn {
    position: absolute; top: 14px; left: 18px; z-index: 100;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    background: rgba(30,0,40,0.72); border: 1.5px solid #6ef7ff;
    border-radius: 30px; padding: 7px 16px;
    box-shadow: 0 0 12px #6ef7ff55, 0 0 28px #0099aa44;
    transition: box-shadow 0.3s; user-select: none;
  }
  #music-btn:hover { box-shadow: 0 0 18px #6ef7ffaa; }
  #music-btn span {
    font-size: 13px; font-style: italic; font-weight: bold;
    color: #ccffff; text-shadow: 0 0 8px #44ffff, 0 0 18px #00dddd;
  }

  #phrases { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }

  .phrase {
    position: absolute; font-style: italic; font-weight: bold;
    white-space: nowrap; pointer-events: none;
    text-shadow: 0 0 6px currentColor, 0 0 14px currentColor, 0 0 30px currentColor, 0 0 60px currentColor;
    animation: floatDown linear forwards; opacity: 0;
  }
  .heart-fall {
    position: absolute; pointer-events: none;
    animation: floatDown linear forwards; opacity: 0; font-style: normal; line-height: 1;
  }
  @keyframes floatDown {
    0%   { transform: translateY(-60px) rotate(-8deg); opacity: 0; }
    8%   { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(100vh) rotate(8deg); opacity: 0; }
  }

  #moon-container {
    position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; z-index: 10;
  }
  #moon-svg {
    filter: drop-shadow(0 0 10px #ff6ef7) drop-shadow(0 0 25px #ff6ef7) drop-shadow(0 0 55px #dd44cc) drop-shadow(0 0 90px #aa22aa);
    animation: moonPulse 3s ease-in-out infinite;
  }
  @keyframes moonPulse {
    0%,100% { filter: drop-shadow(0 0 10px #ff6ef7) drop-shadow(0 0 25px #ff6ef7) drop-shadow(0 0 55px #dd44cc) drop-shadow(0 0 90px #aa22aa); }
    50%      { filter: drop-shadow(0 0 16px #ffaaff) drop-shadow(0 0 36px #ff88ff) drop-shadow(0 0 70px #ee55ee) drop-shadow(0 0 120px #cc00cc); }
  }
  #moon-text {
    margin-top: 8px; font-size: clamp(13px,1.8vw,18px);
    font-style: italic; color: #ffccff;
    text-shadow: 0 0 6px #ff88ff, 0 0 16px #ff44ff, 0 0 36px #ee00ee;
    animation: moonTextGlow 2.5s ease-in-out infinite;
    text-align: center; max-width: 300px; font-family: 'Georgia', serif; font-weight: bold;
  }
  @keyframes moonTextGlow {
    0%,100% { text-shadow: 0 0 6px #ff88ff, 0 0 16px #ff44ff, 0 0 36px #ee00ee; }
    50%      { text-shadow: 0 0 12px #ffccff, 0 0 28px #ff88ff, 0 0 60px #ff00ff; }
  }
</style>
</head>
<body>

<!-- 🎵 AUDIO — ambos archivos deben estar en la misma carpeta que este HTML -->
<audio id="bgmusic" loop preload="auto">
  <source src="rain_2222.mp3" type="audio/mpeg">
</audio>
<audio id="bgmusic2" loop preload="auto">
  <source src="lluvia.mp3" type="audio/mpeg">
</audio>

<canvas id="bg"></canvas>
<canvas id="rain"></canvas>

<!-- Botón música -->
<div id="music-btn" onclick="toggleMusic()">
  <span id="music-label">▶ Música</span>
</div>

<!-- Botón palabras/corazones -->
<div id="toggle-btn" onclick="toggleMode()">
  <div class="toggle-circle on" id="toggle-circle"></div>
  <span id="toggle-label">Palabras del alma</span>
</div>

<div id="moon-container">
  <svg id="moon-svg" width="110" height="100" viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M55,10 C35,10 15,28 15,48 C15,68 30,90 55,90 C80,90 95,68 95,48 C95,28 75,10 55,10 Z" fill="#2a0030" stroke="#ff6ef7" stroke-width="1.5"/>
    <path d="M55,15 C40,15 25,30 25,48 C25,62 35,80 55,80 C75,80 85,62 85,48 C85,30 70,15 55,15 Z" fill="#1a001f"/>
    <path d="M55,70 L30,50 C24,44 24,36 30,32 C36,28 44,30 50,36 L55,42 L60,36 C66,30 74,28 80,32 C86,36 86,44 80,50 Z" fill="#ff6ef7" opacity="0.9"/>
    <circle cx="40" cy="52" r="1.5" fill="#ffccff" opacity="0.7"/>
    <circle cx="70" cy="52" r="1.5" fill="#ffccff" opacity="0.7"/>
    <circle cx="55" cy="42" r="1" fill="#ffffff" opacity="0.5"/>
  </svg>
  <div id="moon-text"></div>
</div>

<div id="phrases"></div>

<script>
const W = window.innerWidth, H = window.innerHeight;
const bgCanvas = document.getElementById('bg'); bgCanvas.width = W; bgCanvas.height = H;
const bgCtx = bgCanvas.getContext('2d');
const rainCanvas = document.getElementById('rain'); rainCanvas.width = W; rainCanvas.height = H;
const rainCtx = rainCanvas.getContext('2d');

let showWords = true;
let musicPlaying = false;

const audio  = document.getElementById('bgmusic');
const audio2 = document.getElementById('bgmusic2');

audio.volume  = 0.75;
audio2.volume = 0.65;

function playBoth() {
  audio.currentTime  = 0;
  audio2.currentTime = 0;
  const p1 = audio.play();
  const p2 = audio2.play();
  const safe = p => (p instanceof Promise ? p : Promise.resolve());
  Promise.all([safe(p1), safe(p2)]).then(() => {
    document.getElementById('music-label').textContent = '⏸ Música';
    musicPlaying = true;
  }).catch(e => console.warn('Audio error:', e));
}

function pauseBoth() {
  audio.pause();
  audio2.pause();
  document.getElementById('music-label').textContent = '▶ Música';
  musicPlaying = false;
}

function toggleMusic() {
  if (musicPlaying) { pauseBoth(); } else { playBoth(); }
}

let autoStarted = false;
document.addEventListener('click', () => {
  if (!autoStarted && !musicPlaying) { autoStarted = true; playBoth(); }
}, { once: true });

function toggleMode() {
  showWords = !showWords;
  const circle = document.getElementById('toggle-circle');
  document.getElementById('toggle-label').textContent = showWords ? 'Palabras del alma' : 'Corazones';
  showWords ? circle.classList.add('on') : circle.classList.remove('on');
}

const FLOWER_COLORS = ['#ff6ef7','#6ef7ff','#f7ff6e','#6effa0','#ff6ea0','#a06eff','#ffb06e','#6effdd','#ff6e6e','#b0ff6e'];

function drawFlower(ctx, x, y, r, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.shadowColor = color; ctx.shadowBlur = 18;
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI*2/6)*i;
    ctx.beginPath();
    ctx.ellipse(x+Math.cos(a)*r*0.7, y+Math.sin(a)*r*0.7, r*0.55, r*0.32, a, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(x,y,r*0.28,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.shadowBlur=10; ctx.fill(); ctx.restore();
}

const flowers = Array.from({length:26}, () => ({
  x: Math.random()*W, y: Math.random()*H, r: 10+Math.random()*22,
  color: FLOWER_COLORS[Math.floor(Math.random()*FLOWER_COLORS.length)],
  alpha: 0.5+Math.random()*0.5, phase: Math.random()*Math.PI*2, speed: 0.4+Math.random()*0.8
}));

function drawBg(t) {
  bgCtx.clearRect(0,0,W,H); bgCtx.fillStyle='#050510'; bgCtx.fillRect(0,0,W,H);
  for (let i=0;i<80;i++) {
    const glow=0.3+0.7*Math.abs(Math.sin(t*0.001+i));
    bgCtx.beginPath(); bgCtx.arc((i*137.5)%W,(i*73.3)%H,0.8,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(255,220,255,${glow*0.7})`; bgCtx.fill();
  }
  flowers.forEach(f => {
    const p=0.6+0.4*Math.abs(Math.sin(t*0.001*f.speed+f.phase));
    drawFlower(bgCtx,f.x,f.y,f.r,f.color,f.alpha*p);
  });
}

const drops = Array.from({length:140}, () => ({
  x:Math.random()*W, y:Math.random()*H, len:8+Math.random()*20, speed:5+Math.random()*9,
  color:FLOWER_COLORS[Math.floor(Math.random()*FLOWER_COLORS.length)], alpha:0.15+Math.random()*0.35
}));

function drawRain() {
  rainCtx.clearRect(0,0,W,H);
  drops.forEach(d => {
    rainCtx.save(); rainCtx.globalAlpha=d.alpha; rainCtx.shadowColor=d.color; rainCtx.shadowBlur=6;
    rainCtx.strokeStyle=d.color; rainCtx.lineWidth=1;
    rainCtx.beginPath(); rainCtx.moveTo(d.x,d.y); rainCtx.lineTo(d.x-1.5,d.y+d.len);
    rainCtx.stroke(); rainCtx.restore();
    d.y+=d.speed; if(d.y>H+30){d.y=-d.len;d.x=Math.random()*W;}
  });
}

const PHRASES = [
  "Eres valiosa ✨","Un niño te ama 💛","Me importas mucho","Eres importante","Todo pasa, confía",
  "Lo mejor te espera","La calma llegará","Tienes tiempo, respira","Un pequeño te acompaña","Dios te cuida",
  "Tu esencia ilumina","Iluminas mi vida","Eres única en el mundo","Tu alma espera radiar","Tú importas",
  "Tú te construyes","Eres luz en mi camino","Tu corazón es oro","Mereces amor","Eres suficiente",
  "Cada día es un regalo","Tu sonrisa transforma","Eres más fuerte de lo que crees","El mundo te necesita",
  "Eres hermosa por dentro","Tu presencia es un regalo","Tienes un propósito","Eres capaz de todo",
  "Tu amor es poderoso","Eres digna de felicidad","Hay esperanza para ti","No estás sola","Brillarás",
  "Tu historia importa","Eres bendecida","Tienes magia dentro","Cada paso tuyo vale","Renaces cada día",
  "Tu amor mueve montañas","Hay alguien que te piensa","Eres paz y fuerza","Tu bondad es real",
  "Mereces lo mejor","Eres un milagro","Tu camino tiene sentido","Hay luz en ti","Eres amada",
  "Tu alma es pura","Sigues adelante y eso es valioso","Yo creo en ti"
];
const PHRASE_COLORS = ['#ff6ef7','#6ef7ff','#f7ff6e','#6effa0','#ff6ea0','#a06eff','#ffb06e','#6effdd'];
const HEART_CHARS = ['💜','💖','💗','💝','💞','💓','🩷','💕'];
const HEART_COLORS = ['#ff6ef7','#ff88cc','#cc66ff','#ff99ff','#ff55aa','#dd44ff','#ffaaee','#bb44ff'];
const phrasesDiv = document.getElementById('phrases');
let phraseIndex=0, heartIndex=0, activeCount=0;

function spawnItem() {
  if(activeCount>=5) return; activeCount++;
  const el=document.createElement('div');
  const duration=7+Math.random()*6;
  if(showWords){
    el.className='phrase';
    const color=PHRASE_COLORS[Math.floor(Math.random()*PHRASE_COLORS.length)];
    el.style.color=color; el.style.fontSize=`clamp(13px,${1.4+Math.random()*0.8}vw,${17+Math.floor(Math.random()*5)}px)`;
    el.textContent=PHRASES[phraseIndex++%PHRASES.length];
  } else {
    el.className='heart-fall';
    const color=HEART_COLORS[Math.floor(Math.random()*HEART_COLORS.length)];
    el.style.fontSize=(20+Math.floor(Math.random()*28))+'px';
    el.style.color=color; el.style.textShadow=`0 0 8px ${color},0 0 20px ${color},0 0 40px ${color}`;
    el.textContent=HEART_CHARS[heartIndex++%HEART_CHARS.length];
  }
  el.style.left=(5+Math.random()*82)+'%'; el.style.top='0px'; el.style.animationDuration=duration+'s';
  phrasesDiv.appendChild(el);
  setTimeout(()=>{el.remove();activeCount--;},duration*1000+200);
}

const MOON_PHRASES=["Eres valiosa","Un niño te ama","Me importas","Eres importante","Todo pasa","Lo mejor espera","La calma llegará","Tienes tiempo","Te acompaño","Dios te cuida","Tu esencia ilumina","Eres única","Tú importas","Tú te construyes","Eres luz"];
let moonIdx=0;
const moonText=document.getElementById('moon-text');
function rotateMoonText(){
  moonText.style.opacity='0'; moonText.style.transition='opacity 0.5s';
  setTimeout(()=>{moonText.textContent='✦ '+MOON_PHRASES[moonIdx++%MOON_PHRASES.length]+' ✦';moonText.style.opacity='1';},500);
}
rotateMoonText(); setInterval(rotateMoonText,2800); setInterval(spawnItem,1400);
function loop(t){drawBg(t);drawRain();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
window.addEventListener('resize',()=>{bgCanvas.width=rainCanvas.width=window.innerWidth;bgCanvas.height=rainCanvas.height=window.innerHeight;});
</script>
</body>
</html>
